<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="desk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7d8998" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#475465" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfd7df" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#9eacbc" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="blueprint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5f7fa1" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7f98b5" stop-opacity="0.24"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#desk)"/>

  <!-- Big table papers -->
  <g transform="rotate(-10 420 260)" filter="url(#soft)">
    <rect x="120" y="120" width="560" height="340" rx="18" fill="url(#sheet)"/>
    <line x1="180" y1="190" x2="620" y2="190" stroke="#c9d4df" stroke-opacity="0.5" stroke-width="5"/>
    <line x1="180" y1="235" x2="560" y2="235" stroke="#c9d4df" stroke-opacity="0.4" stroke-width="4"/>
    <line x1="180" y1="278" x2="590" y2="278" stroke="#c9d4df" stroke-opacity="0.38" stroke-width="4"/>
    <line x1="180" y1="322" x2="540" y2="322" stroke="#c9d4df" stroke-opacity="0.35" stroke-width="4"/>
    <circle cx="560" cy="374" r="34" fill="#8e9fb2" fill-opacity="0.28"/>
  </g>

  <g transform="rotate(8 1020 330)">
    <rect x="760" y="130" width="640" height="380" rx="20" fill="url(#blueprint)"/>
    <rect x="815" y="190" width="530" height="250" rx="8" fill="none" stroke="#a8bfd6" stroke-opacity="0.4" stroke-width="4"/>
    <line x1="815" y1="250" x2="1345" y2="250" stroke="#a8bfd6" stroke-opacity="0.35" stroke-width="3"/>
    <line x1="815" y1="310" x2="1345" y2="310" stroke="#a8bfd6" stroke-opacity="0.35" stroke-width="3"/>
    <line x1="990" y1="190" x2="990" y2="440" stroke="#a8bfd6" stroke-opacity="0.3" stroke-width="3"/>
    <line x1="1165" y1="190" x2="1165" y2="440" stroke="#a8bfd6" stroke-opacity="0.3" stroke-width="3"/>
  </g>

  <!-- Managers from top view -->
  <g transform="translate(540 560)">
    <circle cx="0" cy="0" r="34" fill="#d9b56f" fill-opacity="0.30"/>
    <rect x="-28" y="26" width="56" height="42" rx="16" fill="#8ba0b6" fill-opacity="0.25"/>
  </g>
  <g transform="translate(670 600)">
    <circle cx="0" cy="0" r="32" fill="#d1c2a4" fill-opacity="0.30"/>
    <rect x="-26" y="24" width="52" height="38" rx="14" fill="#8d9eb0" fill-opacity="0.24"/>
  </g>
  <g transform="translate(800 560)">
    <circle cx="0" cy="0" r="33" fill="#c7b190" fill-opacity="0.28"/>
    <rect x="-27" y="25" width="54" height="40" rx="14" fill="#8197ad" fill-opacity="0.22"/>
  </g>

  <!-- Small document cards around -->
  <g opacity="0.35">
    <rect x="220" y="620" width="210" height="130" rx="12" fill="#a9b8c7"/>
    <rect x="1190" y="620" width="240" height="150" rx="12" fill="#9cb0c2"/>
    <rect x="1000" y="560" width="150" height="90" rx="10" fill="#b4c2cf"/>
  </g>
</svg>
